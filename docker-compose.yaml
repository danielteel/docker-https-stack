services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:rw
      - ./vhost.d:/etc/nginx/vhost.d
      - html_data:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    environment:
      - TRUST_DOWNSTREAM_PROXY=false
    networks:
      - web
    restart: unless-stopped

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    depends_on:
      - nginx-proxy
    volumes:
      - ./certs:/etc/nginx/certs:rw
      - ./vhost.d:/etc/nginx/vhost.d
      - html_data:/usr/share/nginx/html
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DEFAULT_EMAIL=${LETSENCRYPT_EMAIL}
      - NGINX_PROXY_CONTAINER=nginx-proxy
      - HTTPS_METHOD=redirect
    networks:
      - web
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      - VIRTUAL_HOST=${LETSENCRYPT_HOST}
      - LETSENCRYPT_HOST=${LETSENCRYPT_HOST}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    networks:
      - web
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend
    environment:
      - VIRTUAL_PATH=${API_VIRTUAL_PATH}
      - VIRTUAL_PORT=${API_PORT}
      - VIRTUAL_HOST=${LETSENCRYPT_HOST}
      - API_PORT=${API_PORT}
      - DEVICE_PORT=${DEVICE_PORT}
      - SUPER_PASSWORD=${SUPER_PASSWORD}
      - SUPER_USERNAME=${SUPER_USERNAME}
      - DOMAIN=${DOMAIN}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_PORT=${EMAIL_PORT}
      - DEVICES=${DEVICES}
      - KASA_PLUGS=${KASA_PLUGS}
      - PECRON_EMAIL=${PECRON_EMAIL}
      - PECRON_PASSWORD=${PECRON_PASSWORD}
      - PECRON_REGION=${PECRON_REGION}
      - PECRON_DEVICE=${PECRON_DEVICE}
    tmpfs:
      - /usr/src/app/tmp:rw,size=50m
    depends_on:
      - postgres
    ports:
      - ${DEVICE_PORT}:${DEVICE_PORT}
    networks:
      - web
      - database
    restart: unless-stopped

  integrations:
    build: ./integrations
    container_name: integrations
    environment:
      - RTSP_DVR_USERNAME=${RTSP_DVR_USERNAME}
      - RTSP_DVR_PASSWORD=${RTSP_DVR_PASSWORD}
      - RTSP_DVR_HOST=${RTSP_DVR_HOST}
      - RTSP_DVR_PORT=${RTSP_DVR_PORT:-554}
      - RTSP_DVR_CHANNELS=${RTSP_DVR_CHANNELS:-1,2,3,4}
      - RTSP_DVR_SUBTYPE=${RTSP_DVR_SUBTYPE:-1}
      - RTSP_CAPTURE_INTERVAL_SECONDS=${RTSP_CAPTURE_INTERVAL_SECONDS:-2}
      - RTSP_STREAM_STALL_SECONDS=${RTSP_STREAM_STALL_SECONDS:-60}
      - RTSP_DEVICE_ID_PATTERN=${RTSP_DEVICE_ID_PATTERN}
      - API_PORT=${API_PORT:-3000}
      - PECRON_EMAIL=${PECRON_EMAIL}
      - PECRON_PASSWORD=${PECRON_PASSWORD}
      - PECRON_REGION=${PECRON_REGION}
      - PECRON_DEVICE=${PECRON_DEVICE}
      - PECRON_WSS_DEVICE_ID=${PECRON_WSS_DEVICE_ID:-pecron-power-station}
      - PECRON_WSS_POLL_INTERVAL_SECONDS=${PECRON_WSS_POLL_INTERVAL_SECONDS:-30}
    depends_on:
      - backend
    networks:
      - web
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - database
    restart: unless-stopped
      
  desec-ddns:
    build: ./desec-ddns
    container_name: desec-ddns
    environment:
      DESEC_TOKEN: ${DESEC_TOKEN}
      DESEC_DOMAIN: ${DESEC_DOMAIN}
    restart: unless-stopped

networks:
   web:
   database:
     internal: true  

volumes:
  postgres_data:
  html_data:
